services:
  postgres:
    image: postgres:16-alpine
    container_name: eyed-bio-db
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eyedbio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eyedbio_secret}
      POSTGRES_DB: ${POSTGRES_DB:-eyedbio}
    volumes:
      - ${EYEDBIO_DATA_ROOT:-./.docker-data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-eyedbio} -d ${POSTGRES_DB:-eyedbio}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - eyed-net

  eyed-bio:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    image: eyed-bio-app:local
    container_name: eyed-bio-app
    expose:
      - "9090"
    environment:
      NODE_ENV: production
      POSTGRES_USER: ${POSTGRES_USER:-eyedbio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eyedbio_secret}
      POSTGRES_DB: ${POSTGRES_DB:-eyedbio}
      POSTGRES_HOST: postgres
      UPLOAD_DIR: /data/uploads
      PUBLIC_MEDIA_PREFIX: /media
      AUTH_SECRET: ${AUTH_SECRET:-kNGTnHIoXenFhVWwzCSW3LYJ+YKlTb2gW5Lx7XhYkvY=}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:9090}
      # URL pública para vistas previa en Discord/WhatsApp (debe ser https://tu-dominio)
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      # Correo real — opción A: Resend (recomendado, https://resend.com)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      # Correo real — opción B: SMTP (Gmail, Outlook, etc.)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      CONTENT_MODERATION: ${CONTENT_MODERATION:-off}
      SIGHTENGINE_API_USER: ${SIGHTENGINE_API_USER:-}
      SIGHTENGINE_API_SECRET: ${SIGHTENGINE_API_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OAUTH_ENABLED: ${OAUTH_ENABLED:-on}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      EYEDBOT_PRESENCE_URL: ${EYEDBOT_PRESENCE_URL:-}
      EYEDBOT_API_KEY: ${EYEDBOT_API_KEY:-}
      LANYARD_FALLBACK: ${LANYARD_FALLBACK:-off}
      AUTH_TRUST_HOST: "true"
      HOSTNAME: 0.0.0.0
      PORT: "9090"
    volumes:
      - ${EYEDBIO_DATA_ROOT:-./.docker-data}/uploads:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    restart: unless-stopped
    networks:
      - eyed-net

  nginx:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    image: eyed-bio-nginx:local
    container_name: eyed-bio-nginx
    ports:
      - "${APP_PORT:-9090}:9090"
    volumes:
      - ${EYEDBIO_DATA_ROOT:-./.docker-data}/uploads:/data:ro
    depends_on:
      eyed-bio:
        condition: service_started
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/api/health/live > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - eyed-net

networks:
  eyed-net:
    name: eyed-bio-net
    # Otras stacks pueden unirse: docker network connect eyed-bio-net <contenedor>
    # Túnel Cloudflare opcional: docker/compose/docker-compose.tunnel.yml
