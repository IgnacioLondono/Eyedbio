# Build local (desarrollo). Portainer usa imágenes preconstruidas de GHCR.
services:
  eyed-bio:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/ignaciolondono/eyedbio:latest

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: ghcr.io/ignaciolondono/eyedbio-nginx:latest
