name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/ignaciolondono/eyedbio:latest
            ghcr.io/ignaciolondono/eyedbio:${{ github.sha }}
          cache-from: |
            type=gha,scope=eyedbio-app
            type=registry,ref=ghcr.io/ignaciolondono/eyedbio:buildcache
          cache-to: |
            type=gha,mode=max,scope=eyedbio-app
            type=registry,ref=ghcr.io/ignaciolondono/eyedbio:buildcache,mode=max
