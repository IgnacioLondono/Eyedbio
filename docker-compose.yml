services:
  eyed-bio:
    image: ghcr.io/ignaciolondono/eyedbio:latest
    pull_policy: always
    container_name: eyed-bio-app
    expose:
      - "9090"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/dev.db
      UPLOAD_DIR: /data/uploads
      PUBLIC_MEDIA_PREFIX: /media
      AUTH_SECRET: ${AUTH_SECRET:-kNGTnHIoXenFhVWwzCSW3LYJ+YKlTb2gW5Lx7XhYkvY=}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:9090}
      AUTH_TRUST_HOST: "true"
      HOSTNAME: 0.0.0.0
      PORT: 9090
    volumes:
      - eyed-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:9090/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    restart: unless-stopped
    networks:
      - eyed-net

  nginx:
    image: nginx:1.27-alpine
    container_name: eyed-bio-nginx
    configs:
      - source: eyed_nginx_conf
        target: /etc/nginx/nginx.conf
    ports:
      - "${APP_PORT:-9090}:9090"
    volumes:
      - eyed-data:/data:ro
    depends_on:
      eyed-bio:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/api/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - eyed-net

volumes:
  eyed-data:
    name: eyed-bio-data

networks:
  eyed-net:
    name: eyed-bio-net

configs:
  eyed_nginx_conf:
    file: ./nginx/nginx.conf
