services:
  postgres:
    image: postgres:16-alpine
    container_name: eyed-bio-db
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eyedbio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eyedbio_secret}
      POSTGRES_DB: ${POSTGRES_DB:-eyedbio}
    volumes:
      - eyed-db:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-eyedbio} -d ${POSTGRES_DB:-eyedbio} || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped
    networks:
      - eyed-net

  eyed-bio:
    image: ghcr.io/ignaciolondono/eyedbio:latest
    pull_policy: always
    container_name: eyed-bio-app
    expose:
      - "9090"
    environment:
      NODE_ENV: production
      POSTGRES_USER: ${POSTGRES_USER:-eyedbio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eyedbio_secret}
      POSTGRES_DB: ${POSTGRES_DB:-eyedbio}
      POSTGRES_HOST: postgres
      UPLOAD_DIR: /data/uploads
      PUBLIC_MEDIA_PREFIX: /media
      AUTH_SECRET: ${AUTH_SECRET:-kNGTnHIoXenFhVWwzCSW3LYJ+YKlTb2gW5Lx7XhYkvY=}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:9090}
      AUTH_TRUST_HOST: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      CONTENT_MODERATION: ${CONTENT_MODERATION:-off}
      SIGHTENGINE_API_USER: ${SIGHTENGINE_API_USER:-}
      SIGHTENGINE_API_SECRET: ${SIGHTENGINE_API_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HOSTNAME: 0.0.0.0
      PORT: "9090"
    volumes:
      - eyed-uploads:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/app/healthcheck.js"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped
    networks:
      - eyed-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: eyed-bio-nginx:local
    container_name: eyed-bio-nginx
    ports:
      - "${APP_PORT:-9090}:9090"
    volumes:
      - eyed-uploads:/data:ro
    depends_on:
      eyed-bio:
        condition: service_started
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/api/health/live > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - eyed-net

volumes:
  eyed-db:
    name: eyed-bio-db
  eyed-uploads:
    name: eyed-bio-uploads

networks:
  eyed-net:
    name: eyed-bio-net
